# ─────────────────────────────────────────────────────────────
# IMPORTANT: Values base64 encoded hone chahiye
#
# Encode karne ka tarika:
#   echo -n "your-password" | base64
#
# Niche ke values sirf EXAMPLE hain:
#   "redis123"   → cmVkaXMxMjM=
#   "postgres"   → cG9zdGdyZXM=
#   "password"   → cGFzc3dvcmQ=
# ─────────────────────────────────────────────────────────────

# ─── Redis Secret ────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
type: Opaque
data:
  REDIS_PASSWORD: cmVkaXMxMjM=     # "redis123" → apna password encode karke daalo

---
# ─── PostgreSQL Secret ───────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=      # "postgres"
  POSTGRES_PASSWORD: cGFzc3dvcmQ=  # "password" → apna password encode karke daalo
