apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-jk
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp-jk
  template:
    metadata:
      labels:
        app: myapp-jk
    spec:
      containers:
      - name: myapp-jk
        image: nginx
        ports:
        - containerPort: 80
