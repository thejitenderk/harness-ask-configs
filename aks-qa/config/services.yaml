# ─── Redis Service ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis           # vote-api/worker REDIS_HOST=redis se match karta hai
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ─── PostgreSQL Service ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: db              # worker DATABASE_HOST=db se match karta hai
  labels:
    app: db
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432

---
# ─── Vote UI Service ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vote-ui
  labels:
    app: vote-ui
spec:
  type: NodePort
  selector:
    app: vote-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31000    # http://<minikube-ip>:31000

---
# ─── Result UI Service ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: result-ui
  labels:
    app: result-ui
spec:
  type: NodePort
  selector:
    app: result-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31001    # http://<minikube-ip>:31001
